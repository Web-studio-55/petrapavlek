<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Uređivanje bloga | Petra Pavlek</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Open+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link href="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.snow.css" rel="stylesheet">
<style>
  .admin-wrap{max-width:860px;margin:0 auto;padding:50px 24px 90px;}
  .admin-bar{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:30px;flex-wrap:wrap;}
  .admin-bar h1{font-size:26px;font-weight:500;}
  .pill{font-size:12px;background:var(--light);border-radius:100px;padding:6px 14px;color:var(--grey);}
  #editor-card{background:#fff;border-radius:18px;box-shadow:0 10px 34px rgba(20,40,40,.10);padding:36px;}
  #editor{background:#fff;min-height:320px;font-size:16px;font-family:'Open Sans',Arial,sans-serif;}
  .ql-toolbar.ql-snow,.ql-container.ql-snow{border-color:#d0d5d2;border-radius:12px 12px 0 0;}
  .ql-container.ql-snow{border-radius:0 0 12px 12px;}
  .cover-preview{margin-top:10px;border-radius:12px;max-height:200px;object-fit:cover;display:none;}
  .btn-row{display:flex;gap:12px;margin-top:22px;flex-wrap:wrap;align-items:center;}
  .btn.secondary{background:#e9eeee;color:var(--dark);}
  .btn.danger{background:#b23b3b;}
  .status{font-size:14px;color:var(--teal);font-weight:600;}
  .status.err{color:#b23b3b;}
  .post-row{display:flex;justify-content:space-between;align-items:center;gap:14px;background:var(--light);border-radius:12px;padding:14px 20px;margin-bottom:10px;flex-wrap:wrap;}
  .post-row strong{font-family:'Lora',Georgia,serif;font-weight:600;color:var(--dark);}
  .post-row .meta{font-size:12.5px;color:#8a8888;}
  .post-actions{display:flex;gap:8px;}
  .mini{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:8px 16px;border-radius:100px;border:none;cursor:pointer;}
  .mini.edit{background:var(--teal);color:#fff;}
  .mini.del{background:#f1dcdc;color:#8a2f2f;}
  #login-card{max-width:420px;margin:70px auto;}
  h2.section{font-size:20px;font-weight:600;margin:44px 0 16px;}
  @media (max-width:560px){
    .admin-wrap{padding:30px 16px 60px;}
    #editor-card{padding:24px 18px;}
    .post-row{padding:12px 16px;}
  }
</style>
</head>
<body>

<header>
  <div class="wrap nav">
    <a href="index.html" class="logo">Petra <span>Pavlek</span></a>
    <span class="pill">Uređivanje bloga</span>
  </div>
</header>

<div class="form-wrap" id="login-view">
  <div class="form-card" id="login-card">
    <h2>Prijava za uređivanje</h2>
    <p class="sub">Unesi lozinku za objavljivanje na blogu.</p>
    <form id="login-form">
      <div class="field">
        <label for="pass">Lozinka</label>
        <input id="pass" type="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn">Prijavi se</button>
      <p class="form-note status err" id="login-err" style="display:none;">Pogrešna lozinka, pokušaj ponovno.</p>
    </form>
  </div>
</div>

<div class="admin-wrap" id="admin-view" style="display:none;">
  <div class="admin-bar">
    <h1>Novi blog post</h1>
    <div>
      <a href="blog.html" class="pill" target="_blank">Otvori blog ↗</a>
      <button class="mini del" id="logout">Odjava</button>
    </div>
  </div>

  <div id="editor-card">
    <div class="field">
      <label for="f-title">Naslov</label>
      <input id="f-title" type="text" placeholder="Naslov objave">
    </div>
    <div class="field">
      <label for="f-excerpt">Kratki opis (prikazuje se na listi objava)</label>
      <input id="f-excerpt" type="text" placeholder="Jedna do dvije rečenice o čemu je tekst">
    </div>
    <div class="field">
      <label for="f-cover">Naslovna fotografija</label>
      <input id="f-cover" type="file" accept="image/*">
      <img class="cover-preview" id="cover-preview" alt="">
    </div>
    <div class="field">
      <label>Tekst objave</label>
      <div id="editor"></div>
    </div>
    <div class="btn-row">
      <button class="btn" id="publish">Objavi</button>
      <button class="btn secondary" id="new-post" style="display:none;">＋ Novi post</button>
      <span class="status" id="status"></span>
    </div>
    <p class="form-note" style="text-align:left;">Slike ubacuješ gumbom za sliku u alatnoj traci. Nakon objave, novi tekst je na blogu za oko minutu.</p>
  </div>

  <h2 class="section">Objavljeni postovi</h2>
  <div id="post-list"><p class="meta">Učitavam…</p></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.js"></script>
<script>
var API = '/api/blog';
var editingSlug = null;
var coverData = '';

function pass(){ return sessionStorage.getItem('blogpass') || ''; }

// ---- prijava ----
document.getElementById('login-form').addEventListener('submit', function(e){
  e.preventDefault();
  var p = document.getElementById('pass').value;
  fetch(API, {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({action:'login', password:p})})
    .then(function(r){
      if (r.ok) { sessionStorage.setItem('blogpass', p); showAdmin(); }
      else document.getElementById('login-err').style.display = 'block';
    });
});
document.getElementById('logout').addEventListener('click', function(){
  sessionStorage.removeItem('blogpass'); location.reload();
});

function showAdmin(){
  document.getElementById('login-view').style.display = 'none';
  document.getElementById('admin-view').style.display = 'block';
  loadList();
}
if (pass()) showAdmin();

// ---- Quill editor ----
var quill = new Quill('#editor', {
  theme: 'snow',
  placeholder: 'Napiši svoj tekst ovdje…',
  modules: { toolbar: {
    container: [
      [{header: [2, 3, false]}],
      ['bold', 'italic', 'underline'],
      [{list: 'ordered'}, {list: 'bullet'}],
      ['blockquote', 'link', 'image'],
      ['clean']
    ],
    handlers: { image: pickImage }
  }}
});

// ---- slike: odabir + smanjivanje ----
function resizeImage(file, maxW, cb){
  var img = new Image();
  img.onload = function(){
    var w = Math.min(maxW, img.width);
    var h = Math.round(img.height * w / img.width);
    var c = document.createElement('canvas');
    c.width = w; c.height = h;
    c.getContext('2d').drawImage(img, 0, 0, w, h);
    cb(c.toDataURL('image/jpeg', 0.82));
  };
  img.src = URL.createObjectURL(file);
}
function pickImage(){
  var inp = document.createElement('input');
  inp.type = 'file'; inp.accept = 'image/*';
  inp.onchange = function(){
    if (!inp.files[0]) return;
    resizeImage(inp.files[0], 1400, function(dataUri){
      var range = quill.getSelection(true);
      quill.insertEmbed(range.index, 'image', dataUri);
      quill.setSelection(range.index + 1);
    });
  };
  inp.click();
}
document.getElementById('f-cover').addEventListener('change', function(){
  if (!this.files[0]) return;
  resizeImage(this.files[0], 1400, function(dataUri){
    coverData = dataUri;
    var pv = document.getElementById('cover-preview');
    pv.src = dataUri; pv.style.display = 'block';
  });
});

// ---- slug ----
function slugify(s){
  var map = {'č':'c','ć':'c','ž':'z','š':'s','đ':'d'};
  return s.toLowerCase().replace(/[čćžšđ]/g, function(c){return map[c];})
    .replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '').slice(0, 60);
}

// ---- objava ----
document.getElementById('publish').addEventListener('click', function(){
  var title = document.getElementById('f-title').value.trim();
  var excerpt = document.getElementById('f-excerpt').value.trim();
  var html = quill.root.innerHTML;
  var st = document.getElementById('status');
  if (!title) { st.textContent = 'Upiši naslov.'; st.className = 'status err'; return; }
  if (quill.getText().trim().length < 10) { st.textContent = 'Tekst je prazan.'; st.className = 'status err'; return; }
  st.textContent = 'Objavljujem…'; st.className = 'status';
  var slug = editingSlug || slugify(title);
  fetch(API, {method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({action:'publish', password: pass(), slug: slug, title: title, excerpt: excerpt, html: html, cover: coverData})})
    .then(function(r){ return r.json().then(function(j){ return {ok: r.ok, j: j}; }); })
    .then(function(res){
      if (res.ok) {
        st.textContent = 'Objavljeno! Post je na blogu za ~1 min.'; st.className = 'status';
        editingSlug = res.j.slug;
        document.getElementById('new-post').style.display = 'inline-block';
        loadList();
      } else {
        st.textContent = 'Greška: ' + (res.j.error || 'nepoznato'); st.className = 'status err';
      }
    })
    .catch(function(e){ st.textContent = 'Greška: ' + e; st.className = 'status err'; });
});

// ---- novi post / uređivanje / brisanje ----
document.getElementById('new-post').addEventListener('click', function(){
  editingSlug = null; coverData = '';
  document.getElementById('f-title').value = '';
  document.getElementById('f-excerpt').value = '';
  document.getElementById('cover-preview').style.display = 'none';
  document.getElementById('f-cover').value = '';
  quill.setContents([]);
  document.getElementById('status').textContent = '';
  this.style.display = 'none';
  document.querySelector('.admin-bar h1').textContent = 'Novi blog post';
});

function loadList(){
  fetch(API, {cache:'no-store'}).then(function(r){ return r.ok ? r.json() : []; }).then(function(posts){
    var el = document.getElementById('post-list');
    if (!posts.length) { el.innerHTML = '<p class="meta">Još nema objava.</p>'; return; }
    el.innerHTML = '';
    posts.forEach(function(p){
      var row = document.createElement('div');
      row.className = 'post-row';
      row.innerHTML = '<div><strong>' + p.title + '</strong><div class="meta">' + (p.date || '') + ' · ' + p.slug + '</div></div>' +
        '<div class="post-actions"><button class="mini edit">Uredi</button><button class="mini del">Obriši</button></div>';
      row.querySelector('.edit').addEventListener('click', function(){ editPost(p.slug); });
      row.querySelector('.del').addEventListener('click', function(){
        if (!confirm('Sigurno obrisati "' + p.title + '"?')) return;
        fetch(API, {method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({action:'delete', password: pass(), slug: p.slug})})
          .then(function(){ loadList(); });
      });
      el.appendChild(row);
    });
  }).catch(function(){ document.getElementById('post-list').innerHTML = '<p class="meta">Lista dostupna nakon objave na webu.</p>'; });
}

function editPost(slug){
  fetch(API + '?slug=' + slug, {cache:'no-store'}).then(function(r){ return r.json(); }).then(function(p){
    editingSlug = p.slug;
    document.getElementById('f-title').value = p.title;
    document.getElementById('f-excerpt').value = p.excerpt || '';
    quill.root.innerHTML = p.html;
    coverData = p.cover || '';
    var pv = document.getElementById('cover-preview');
    if (p.cover) { pv.src = p.cover; pv.style.display = 'block'; } else { pv.style.display = 'none'; }
    document.querySelector('.admin-bar h1').textContent = 'Uređivanje: ' + p.title;
    document.getElementById('new-post').style.display = 'inline-block';
    window.scrollTo(0, 0);
  });
}
</script>

</body>
</html>
